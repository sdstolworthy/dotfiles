---
- name: Install Software
  hosts: all
  roles:
    - role: packages
      tags: packages
    - role: fonts
      tags: fonts

- name: Configure dotfiles
  hosts: all
  vars:
    home: "{{ ansible_facts['user_dir'] }}"
  roles:
    - role: profile
      tags: profile
    - role: zsh
      tags: zsh
    - role: neovim
      tags: neovim
    - role: alacritty
      tags: alacritty
      when: has_display
    - role: starship
      tags: starship
    - role: workplace_directory
      tags: workplace_directory
    - role: language_managers
      tags: language_managers
    - role: zellij
      tags: zellij
    - role: gitconfig
      tags: gitconfig
    - role: gpg
      tags: gpg
    - role: editorconfig
      tags: editorconfig
    - role: logseq
      tags: logseq
    - role: ai_tools
      tags: ai_tools
    - role: agents_md
      tags: agents_md
    # - role: sway
    #   tags: sway
    #   when: ansible_system != 'Darwin'
