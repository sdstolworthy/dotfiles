---
- name: Install starship (Mac)
  when: is_mac
  community.general.homebrew:
    name: starship
    state: present

- name: Install starship from package manager (Linux)
  when: not is_mac
  become: "{{ should_become }}"
  ansible.builtin.package:
    name: starship
    state: present
  register: starship_package_result
  failed_when: false

- name: Warn about failed starship package installation
  when: not is_mac and (starship_package_result.failed | default(false))
  ansible.builtin.debug:
    msg: "WARNING: Failed to install starship from package manager, will try installer script"

- name: Check if starship binary is present
  when: not is_mac
  ansible.builtin.command: which starship
  register: starship_binary_check
  changed_when: false
  failed_when: false

- name: Install starship from installer script (Linux, fallback)
  when: not is_mac and (starship_binary_check.rc | default(1)) != 0
  block:
    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: ~/.local/bin
        state: directory
        mode: "0755"

    - name: Download starship installer
      ansible.builtin.get_url:
        url: https://starship.rs/install.sh
        dest: /tmp/starship_install.sh
        mode: "0755"

    - name: Execute starship installer
      ansible.builtin.shell: |
        set -o pipefail
        /tmp/starship_install.sh -y -b ~/.local/bin
      args:
        creates: ~/.local/bin/starship
        executable: /bin/bash

- name: Create starship config directory
  ansible.builtin.file:
    path: ~/.config
    state: directory
    mode: "0755"

- name: Symlink starship config
  ansible.builtin.file:
    src: "{{ playbook_dir }}/../roles/starship/files/starship.toml"
    dest: ~/.config/starship.toml
    state: link
