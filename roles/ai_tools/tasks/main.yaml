---
- name: Install kiro-cli (Mac)
  when: is_mac
  community.general.homebrew:
    name: kiro-cli
    state: present
  register: ai_tools_kiro_mac
  failed_when: false

- name: Install kiro-cli (Linux)
  when: not is_mac
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://cli.kiro.dev/install | bash
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.local/bin/kiro-cli"
    executable: /bin/bash
  register: ai_tools_kiro_linux
  failed_when: false

- name: Warn about failed kiro-cli installation
  when: (ai_tools_kiro_mac is defined and ai_tools_kiro_mac.failed | default(false)) or
        (ai_tools_kiro_linux is defined and ai_tools_kiro_linux.failed | default(false))
  ansible.builtin.debug:
    msg: "WARNING: Failed to install kiro-cli"

- name: Install npm-based AI tools
  loop: "{{ ai_tools_npm_packages }}"
  ansible.builtin.shell: |
    set -o pipefail
    export PATH="$HOME/.local/bin:$PATH"
    eval "$(mise activate bash)"
    npm install -g {{ item }}
  args:
    executable: /bin/bash
  register: ai_tools_npm_result
  changed_when: "'added' in ai_tools_npm_result.stdout"
  failed_when: false

- name: Warn about failed npm installations
  when: (item.rc | default(0)) != 0
  loop: "{{ ai_tools_npm_result.results }}"
  ansible.builtin.debug:
    msg: "WARNING: Failed to install {{ item.item }}: {{ item.stderr | default('unknown error') }}"
  loop_control:
    label: "{{ item.item }}"
