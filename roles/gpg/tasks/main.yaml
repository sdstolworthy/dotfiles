---
- name: Ensure .gnupg directory exists
  ansible.builtin.file:
    path: ~/.gnupg
    state: directory
    mode: "0700"

- name: Copy gpg.conf
  ansible.builtin.copy:
    src: gpg.conf
    dest: ~/.gnupg/gpg.conf
    mode: "0600"

- name: Detect pinentry program
  ansible.builtin.shell: command -v pinentry-mac 2>/dev/null || command -v pinentry 2>/dev/null || echo ""
  register: gpg_pinentry_path
  changed_when: false

- name: Template gpg-agent.conf
  ansible.builtin.template:
    src: gpg-agent.conf.j2
    dest: ~/.gnupg/gpg-agent.conf
    mode: "0600"
  notify: Reload gpg-agent

- name: Configure git commit signing
  community.general.git_config:
    name: "{{ item.name }}"
    scope: global
    value: "{{ item.value }}"
  loop:
    - { name: commit.gpgsign, value: "true" }
    - { name: user.signingkey, value: "{{ gpg_signing_key }}" }
  when: gpg_signing_key is defined
