---
- name: Install mise (Mac)
  when: is_mac
  community.general.homebrew:
    name: mise
    state: present

- name: Install mise (Linux)
  when: not is_mac
  ansible.builtin.get_url:
    url: https://mise.run
    dest: /tmp/mise_install.sh
    mode: "0755"
  register: language_managers_mise_download

- name: Execute mise installer (Linux)
  when: not is_mac and language_managers_mise_download is succeeded
  ansible.builtin.shell: |
    set -o pipefail
    /tmp/mise_install.sh
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.local/bin/mise"
    executable: /bin/bash

- name: Create mise profile
  when: profile_profiled_directory is defined
  ansible.builtin.copy:
    src: mise.sh
    dest: "{{ profile_profiled_directory }}/mise.sh"
    mode: "0644"

- name: Install fzf from package manager
  become: "{{ should_become }}"
  ansible.builtin.package:
    name: fzf
    state: present
  register: language_managers_fzf_pm
  failed_when: false

- name: Check if fzf binary is present
  ansible.builtin.command: which fzf
  register: language_managers_fzf_check
  changed_when: false
  failed_when: false

- name: Install fzf via mise (fallback when PM did not provide it)
  when: language_managers_fzf_check.rc != 0
  ansible.builtin.shell: |
    set -o pipefail
    export PATH="$HOME/.local/bin:$PATH"
    mise use -g fzf@latest
  args:
    executable: /bin/bash
  register: language_managers_fzf_mise
  changed_when: "'installed' in language_managers_fzf_mise.stdout"
  failed_when: false

- name: Warn about failed fzf installation
  when: language_managers_fzf_check.rc != 0 and language_managers_fzf_mise.rc | default(0) != 0
  ansible.builtin.debug:
    msg: "WARNING: Failed to install fzf: {{ language_managers_fzf_mise.stderr | default('unknown error') | regex_replace('\\x1b\\[[0-9;]*m', '') }}"

- name: Install tools with mise
  loop: "{{ language_managers_mise_tools }}"
  ansible.builtin.shell: |
    set -o pipefail
    export PATH="$HOME/.local/bin:$PATH"
    mise use -g {{ item }}@latest
  args:
    executable: /bin/bash
  register: language_managers_mise_install
  changed_when: "'installed' in language_managers_mise_install.stdout"
  failed_when: false

- name: Warn about failed mise tool installations
  loop: "{{ language_managers_mise_install.results }}"
  when: item.rc != 0
  ansible.builtin.debug:
    msg: "WARNING: Failed to install {{ item.item }}: {{ item.stderr | default('unknown error') | regex_replace('\\x1b\\[[0-9;]*m', '') }}"
