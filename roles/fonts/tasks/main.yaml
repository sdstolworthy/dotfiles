---
- name: Install Nerd Fonts (Mac)
  when: is_mac
  block:
    - name: Create fonts directory
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/Library/Fonts/NerdFonts"
        state: directory
        mode: "0755"

    - name: Check if FiraCode already installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/Library/Fonts/NerdFonts/FiraCodeNerdFontMono-Regular.ttf"
      register: fonts_firacode_mac_check

    - name: Install FiraCode Nerd Font
      when: not fonts_firacode_mac_check.stat.exists
      block:
        - name: Download FiraCode Nerd Font
          ansible.builtin.get_url:
            url: "{{ fonts_firacode_url }}"
            dest: /tmp/FiraCode.zip
            mode: "0644"

        - name: Extract FiraCode Nerd Font
          ansible.builtin.unarchive:
            src: /tmp/FiraCode.zip
            dest: "{{ ansible_env.HOME }}/Library/Fonts/NerdFonts"
            remote_src: true

        - name: Cleanup FiraCode zip
          ansible.builtin.file:
            path: /tmp/FiraCode.zip
            state: absent

    - name: Check if Monaspace already installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/Library/Fonts/NerdFonts/MonaspiceArNerdFontMono-Regular.otf"
      register: fonts_monaspace_mac_check

    - name: Install Monaspace Nerd Font
      when: not fonts_monaspace_mac_check.stat.exists
      block:
        - name: Download Monaspace Nerd Font
          ansible.builtin.get_url:
            url: "{{ fonts_monaspace_url }}"
            dest: /tmp/Monaspace.zip
            mode: "0644"

        - name: Extract Monaspace Nerd Font
          ansible.builtin.unarchive:
            src: /tmp/Monaspace.zip
            dest: "{{ ansible_env.HOME }}/Library/Fonts/NerdFonts"
            remote_src: true

        - name: Cleanup Monaspace zip
          ansible.builtin.file:
            path: /tmp/Monaspace.zip
            state: absent

- name: Install FiraCode Nerd Font (Linux)
  when: not is_mac
  block:
    - name: Install unzip and fontconfig
      become: "{{ should_become }}"
      ansible.builtin.package:
        name:
          - unzip
          - fontconfig
        state: present

    - name: Create fonts directory
      become: "{{ should_become }}"
      ansible.builtin.file:
        path: /usr/local/share/fonts/FiraCodeNerdFont
        state: directory
        mode: "0755"

    - name: Check if font already installed
      ansible.builtin.stat:
        path: /usr/local/share/fonts/FiraCodeNerdFont/FiraCodeNerdFont-Regular.ttf
      register: fonts_font_check

    - name: Download and install FiraCode font
      when: not fonts_font_check.stat.exists
      block:
        - name: Download FiraCode Nerd Font
          ansible.builtin.get_url:
            url: "{{ fonts_firacode_url }}"
            dest: /tmp/FiraCode.zip
            mode: "0644"

        - name: Extract FiraCode Nerd Font
          become: "{{ should_become }}"
          ansible.builtin.unarchive:
            src: /tmp/FiraCode.zip
            dest: /usr/local/share/fonts/FiraCodeNerdFont
            remote_src: true

        - name: Refresh font cache
          become: "{{ should_become }}"
          ansible.builtin.command: fc-cache -fv
          changed_when: true

        - name: Cleanup downloaded zip
          ansible.builtin.file:
            path: /tmp/FiraCode.zip
            state: absent

  rescue:
    - name: Warn about font installation failure
      ansible.builtin.debug:
        msg: "WARNING: FiraCode font installation failed. Terminal may not display correctly."

    - name: Cleanup on failure
      ansible.builtin.file:
        path: /tmp/FiraCode.zip
        state: absent
      failed_when: false

- name: Install Monaspace Nerd Font (Linux)
  when: not is_mac
  block:
    - name: Create Monaspace fonts directory
      become: "{{ should_become }}"
      ansible.builtin.file:
        path: /usr/local/share/fonts/MonaspaceNerdFont
        state: directory
        mode: "0755"

    - name: Check if Monaspace font already installed
      ansible.builtin.stat:
        path: /usr/local/share/fonts/MonaspaceNerdFont/MonaspiceNeNerdFont-Regular.otf
      register: fonts_monaspace_check

    - name: Download and install Monaspace font
      when: not fonts_monaspace_check.stat.exists
      block:
        - name: Download Monaspace Nerd Font
          ansible.builtin.get_url:
            url: "{{ fonts_monaspace_url }}"
            dest: /tmp/Monaspace.zip
            mode: "0644"

        - name: Extract Monaspace Nerd Font
          become: "{{ should_become }}"
          ansible.builtin.unarchive:
            src: /tmp/Monaspace.zip
            dest: /usr/local/share/fonts/MonaspaceNerdFont
            remote_src: true

        - name: Refresh font cache
          become: "{{ should_become }}"
          ansible.builtin.command: fc-cache -fv
          changed_when: true

        - name: Cleanup downloaded zip
          ansible.builtin.file:
            path: /tmp/Monaspace.zip
            state: absent

  rescue:
    - name: Warn about Monaspace font installation failure
      ansible.builtin.debug:
        msg: "WARNING: Monaspace font installation failed."

    - name: Cleanup on failure
      ansible.builtin.file:
        path: /tmp/Monaspace.zip
        state: absent
      failed_when: false
